type item_name {
  itemID: Int!
  itemName: String!
  bought: Boolean!
  category: String!
}

type Query {
  items: [item_name!]!
}

type Mutation {
  toggleBought(itemID: Int!, bought: Boolean!): item_name!
  addItem(itemName: String!, category: String!): item_name!
  deleteItem(itemID: Int!): Boolean!
}